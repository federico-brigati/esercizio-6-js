<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Operazioni</title>
</head>
<body>
  <h1>Apri la console del browser (F12) per vedere i risultati</h1>

  <script>
    let num1 = prompt("Inserisci il primo numero:");
    let num2 = prompt("Inserisci il secondo numero:");

    num1 = Number(num1);
    num2 = Number(num2);

    let somma        = num1 + num2;
    let sottrazione  = num1 - num2;
    let moltiplicazione = num1 * num2;
    let divisione    = num1 / num2;
    let potenza      = num1 ** num2;

    console.log(
      "Con i numeri da te scelti, i risultati delle varie operazioni sono: " +
      "somma (" + somma + "), " +
      "sottrazione (" + sottrazione + "), " +
      "moltiplicazione (" + moltiplicazione + "), " +
      "divisione (" + divisione + "), " +
      "potenza (" + potenza + ")"
    );
  </script>
</body>
</html>
